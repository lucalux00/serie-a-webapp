name: Scraping Pipeline (Mercato e News)

on:
  push:
    branches:
      - main
  schedule:
    # Esegue lo scraping ogni 30 minuti (minuto 0 e 30 di ogni ora)
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-scraping:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary requests beautifulsoup4 feedparser
        
    - name: Run Scrapers
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        python scripts/scraping/scraper_mercato.py
        python scripts/scraping/scraper_news.py
