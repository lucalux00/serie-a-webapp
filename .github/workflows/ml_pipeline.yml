name: MLOps Predictions Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # Esegue il workflow ogni venerdì e martedì alle 08:00 UTC
    - cron: '0 8 * * 2,5'
  workflow_dispatch: # Permette di avviarlo manualmente dal pannello GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r webapp/scripts/ml/requirements.txt
        
    - name: Run MLOps Algorithm
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        python webapp/scripts/ml/train_and_predict.py
